services:
  # ==================== API BACKEND ====================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: checkers-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/sqlite.db
    volumes:
      - sqlite-data:/app/data
    networks:
      - checkers-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== FRONTEND WEB ====================
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: checkers-web
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - checkers-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

# ==================== REDES ====================
networks:
  checkers-net:
    driver: bridge

# ==================== VOLÚMENES ====================
volumes:
  sqlite-data:
    driver: local
