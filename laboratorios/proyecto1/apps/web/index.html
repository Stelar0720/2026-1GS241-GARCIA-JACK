<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinnoh Edition - Pokémon World Championships</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Press Start 2P', monospace;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        color: #fff;
        image-rendering: pixelated;
        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: unset;
        text-rendering: auto;
      }
      
      #app {
        min-height: 100vh;
      }
      
      /* DS Style Container */
      .ds-container {
        background: #3a3a5a;
        border: 4px solid #1a1a2e;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      
      /* Text Box Style */
      .text-box {
        background: #1a1a2e;
        border: 2px solid #4a4a8a;
        padding: 12px 16px;
        color: #fff;
        font-size: 10px;
        line-height: 1.6;
        image-rendering: pixelated;
      }
      
      /* Button Style */
      .btn {
        background: linear-gradient(180deg, #4a4a8a 0%, #3a3a6a 100%);
        border: 2px solid #6a6aaa;
        color: #fff;
        padding: 10px 20px;
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        cursor: pointer;
        transition: all 0.1s;
        image-rendering: pixelated;
      }
      
      .btn:hover {
        background: linear-gradient(180deg, #5a5a9a 0%, #4a4a7a 100%);
        border-color: #8a8aba;
      }
      
      .btn:active {
        transform: scale(0.98);
      }
      
      .btn-primary {
        background: linear-gradient(180deg, #e0c030 0%, #c0a020 100%);
        border-color: #f0d040;
        color: #1a1a2e;
      }
      
      .btn-danger {
        background: linear-gradient(180deg, #c03030 0%, #a02020 100%);
        border-color: #d04040;
      }
      
      /* Pixel Art Border */
      .pixel-border {
        border: 4px solid #4a4a8a;
        box-shadow: 
          inset 4px 4px 0 #2a2a4a,
          inset -4px -4px 0 #6a6aaa;
      }
      
      /* Loading */
      .loading {
        animation: blink 1s infinite;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      /* Screen Transitions */
      .screen {
        animation: fadeIn 0.3s ease-out;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      /* HP Bar */
      .hp-bar {
        background: #1a1a2e;
        border: 2px solid #4a4a8a;
        height: 12px;
        position: relative;
      }
      
      .hp-bar-fill {
        background: linear-gradient(180deg, #78c850 0%, #58a030 100%);
        height: 100%;
        transition: width 0.3s ease-out;
      }
      
      .hp-bar-fill.low {
        background: linear-gradient(180deg, #f8d030 0%, #d8b020 100%);
      }
      
      .hp-bar-fill.critical {
        background: linear-gradient(180deg, #e04040 0%, #c02020 100%);
      }
      
      /* Type Colors */
      .type-normal { color: #a8a878; }
      .type-fire { color: #f08030; }
      .type-water { color: #6890f0; }
      .type-electric { color: #f8d030; }
      .type-grass { color: #78c850; }
      .type-ice { color: #98d8d8; }
      .type-fighting { color: #c03028; }
      .type-poison { color: #a040a0; }
      .type-ground { color: #e0c068; }
      .type-flying { color: #a890f0; }
      .type-psychic { color: #f85888; }
      .type-bug { color: #a8b820; }
      .type-rock { color: #b8a038; }
      .type-ghost { color: #705898; }
      .type-dragon { color: #7038f8; }
      .type-dark { color: #705848; }
      .type-steel { color: #b8b8d0; }
      .type-fairy { color: #ee99ac; }
      
      /* Footer */
      .legal-footer {
        font-size: 8px;
        color: #6a6a8a;
        text-align: center;
        padding: 16px;
        margin-top: auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
