services:
  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
    ports:
      - "3000:3000"
    environment:
      VITE_ADMIN_APP_URL: http://localhost:5173
      VITE_API_URL: http://localhost:4000
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
      APP_URL: http://localhost:3000
    env_file:
      - .env.local
    depends_on:
      - bun-api

  backoffice:
    build:
      context: .
      dockerfile: Dockerfile.backoffice
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    env_file:
      - .env.local
    depends_on:
      - bun-api

  bun-api:
    build:
      context: ./bun-api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      API_PORT: 4000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MONGODB_URI: mongodb://mongo:27017/?replicaSet=rs0
      MONGODB_DATABASE: urbansprout
    depends_on:
      mongo-init:
        condition: service_completed_successfully

  mongo:
    image: mongo:8.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:8.0
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -c
      - >-
        mongosh --host mongo:27017 --quiet --eval
        "try { rs.status().ok } catch (error) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"

volumes:
  mongo-data:
