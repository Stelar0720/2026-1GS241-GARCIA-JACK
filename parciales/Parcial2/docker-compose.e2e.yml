services:
  mongo-e2e:
    image: mongo:8.0
    command: ["mongod", "--replSet", "rs-e2e", "--bind_ip_all"]
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 2s
      timeout: 5s
      retries: 30

  mongo-e2e-init:
    image: mongo:8.0
    depends_on:
      mongo-e2e:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -c
      - >-
        mongosh --host mongo-e2e:27017 --quiet --eval
        "try { rs.status().ok } catch (error) {
        rs.initiate({_id:'rs-e2e',members:[{_id:0,host:'mongo-e2e:27017'}]}).ok }"
