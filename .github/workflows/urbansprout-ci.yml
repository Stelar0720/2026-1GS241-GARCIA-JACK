name: UrbanSprout CI

concurrency:
  group: urbansprout-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, production]
    paths:
      - "parciales/Parcial2/**"
      - "Dockerfile.storefront"
      - "Dockerfile.backoffice"
      - ".dockerignore"
      - ".github/workflows/urbansprout-ci.yml"
      - ".github/workflows/urbansprout-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "parciales/Parcial2/**"
      - "Dockerfile.storefront"
      - "Dockerfile.backoffice"
      - ".dockerignore"
      - ".github/workflows/urbansprout-ci.yml"
      - ".github/workflows/urbansprout-cd.yml"

defaults:
  run:
    working-directory: parciales/Parcial2

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install storefront dependencies
        run: npm ci

      - name: Install backoffice dependencies
        run: npm --prefix admin-backoffice ci

      - name: Install bun-api dependencies
        run: bun install
        working-directory: parciales/Parcial2/bun-api

      - name: Install MCP dependencies
        run: bun install --frozen-lockfile
        working-directory: parciales/Parcial2/mcp-server

      - name: Prepare local env files
        run: touch .env.local bun-api/.env

      - name: Lint
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate environment configuration
        run: bun test src/config.test.ts
        working-directory: parciales/Parcial2/bun-api

      - name: Run pure unit tests with coverage
        run: bun test src/business.test.ts --coverage --coverage-reporter=lcov
        working-directory: parciales/Parcial2/bun-api

      - name: Run React component tests
        run: npm run test:components

      - name: Run unit tests (Bun + isolated MongoDB)
        run: docker compose run --rm bun-api bun test src/db.test.ts

      - name: Stop unit-test MongoDB
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (storefront + backoffice + API)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: parciales/Parcial2/playwright-report/
          retention-days: 7
