name: UrbanSprout CD

on:
  workflow_run:
    workflows: ["UrbanSprout CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe DEPLOY para promover main a producción"
        required: true
        type: string

permissions:
  contents: write
  deployments: write

concurrency:
  group: urbansprout-cd-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  staging:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: https://urbansprout-storefront-staging.up.railway.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Pinned a propósito. El CLI se instalaba con `latest` y los despliegues
      # dejaron de surtir efecto justo cuando salieron 5.27.1 (20-jul) y 5.27.2
      # (21-jul): el último deploy que sí llegó fue el 17 de julio, con 5.27.0.
      # Una herramienta de despliegue que se actualiza sola convierte cualquier
      # release de un tercero en un cambio en producción sin revisión.
      - name: Install Railway CLI
        run: |
          npm install --global @railway/cli@5.27.0
          railway --version

      # El commit viaja dentro del código subido. Va en src/ porque el Dockerfile
      # del API solo hace `COPY src/ ./src/`: un archivo en la raíz del servicio
      # no llegaría a la imagen.
      - name: Stamp the commit being deployed
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "$DEPLOY_SHA" > parciales/Parcial2/bun-api/src/COMMIT

      - name: Deploy all services to Railway staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          project="8d2bf25d-6881-4ddc-b930-a4dab99773bb"
          railway up ./parciales/Parcial2 --path-as-root --detach --yes \
            --project "$project" --environment staging --service urbansprout-storefront \
            --message "staging ${DEPLOY_SHA}"
          railway up ./parciales/Parcial2 --path-as-root --detach --yes \
            --project "$project" --environment staging --service urbansprout-backoffice \
            --message "staging ${DEPLOY_SHA}"
          # El API va SIN --detach: es el servicio cuya versión verificamos
          # después, así que su build tiene que fallar acá y no diez minutos más
          # tarde en forma de "sigue sirviendo la versión vieja".
          # El servicio API conserva como Root Directory
          # /parciales/Parcial2/bun-api. Por eso se sube el snapshot completo
          # del repositorio; subir solo bun-api duplicaría esa ruta en Railpack.
          railway up . --path-as-root --yes \
            --project "$project" --environment staging --service urbansprout-api \
            --message "staging ${DEPLOY_SHA}"

      # Verificación real: /health lo contesta igual la instancia vieja, así que
      # no prueba nada. Acá se exige que /version devuelva el commit que subimos.
      - name: Verify staging is serving this commit
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: bash .github/scripts/verify-deploy.sh staging "$DEPLOY_SHA"

      - name: Tag staging and generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          tag="staging-${{ github.event.workflow_run.run_number }}-${DEPLOY_SHA::7}"
          gh release create "$tag" --target "$DEPLOY_SHA" --prerelease --generate-notes --title "Staging $tag"

  production:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://urbansprout-storefront-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Producción despliega desde la rama conectada, así que Railway ya inyecta
      # RAILWAY_GIT_COMMIT_SHA y /version lo reporta sin necesidad de sellar nada.
      - name: Promote the tested commit
        run: git push origin "${GITHUB_SHA}:refs/heads/production"

      - name: Verify production is serving this commit
        shell: bash
        run: bash .github/scripts/verify-deploy.sh production "$GITHUB_SHA"

      - name: Tag production and generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(date -u +%Y.%m).${{ github.run_number }}"
          gh release create "$tag" --target "$GITHUB_SHA" --generate-notes --title "UrbanSprout $tag"
