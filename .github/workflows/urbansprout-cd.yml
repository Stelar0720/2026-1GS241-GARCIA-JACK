name: UrbanSprout CD

on:
  workflow_run:
    workflows: ["UrbanSprout CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe DEPLOY para promover main a producción"
        required: true
        type: string

permissions:
  contents: write
  deployments: write

concurrency:
  group: urbansprout-cd-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  staging:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: https://urbansprout-storefront-staging.up.railway.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy all services to Railway staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        shell: bash
        run: |
          project="8d2bf25d-6881-4ddc-b930-a4dab99773bb"
          railway up ./parciales/Parcial2 --path-as-root --detach --yes \
            --project "$project" --environment staging --service urbansprout-storefront \
            --message "staging ${GITHUB_SHA}"
          railway up ./parciales/Parcial2 --path-as-root --detach --yes \
            --project "$project" --environment staging --service urbansprout-backoffice \
            --message "staging ${GITHUB_SHA}"
          railway up ./parciales/Parcial2/bun-api --path-as-root --detach --yes \
            --project "$project" --environment staging --service urbansprout-api \
            --message "staging ${GITHUB_SHA}"

      - name: Wait for Railway staging
        shell: bash
        run: |
          sleep 30
          urls=(
            "https://urbansprout-storefront-staging.up.railway.app"
            "https://urbansprout-backoffice-staging.up.railway.app"
            "https://urbansprout-api-staging.up.railway.app/health"
          )
          for url in "${urls[@]}"; do
            ready=false
            for attempt in {1..30}; do
              if curl --fail --silent --show-error --max-time 15 "$url" > /dev/null; then
                ready=true
                break
              fi
              sleep 10
            done
            if [[ "$ready" != "true" ]]; then
              echo "Staging no quedó saludable: $url" >&2
              exit 1
            fi
          done

      - name: Tag staging and generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          tag="staging-${{ github.event.workflow_run.run_number }}-${DEPLOY_SHA::7}"
          gh release create "$tag" --target "$DEPLOY_SHA" --prerelease --generate-notes --title "Staging $tag"

  production:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://urbansprout-storefront-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Promote the tested commit
        run: git push origin "${GITHUB_SHA}:refs/heads/production"

      - name: Wait for Railway production
        shell: bash
        run: |
          sleep 30
          urls=(
            "https://urbansprout-storefront-production.up.railway.app"
            "https://urbansprout-backoffice-production.up.railway.app"
            "https://urbansprout-api-production.up.railway.app/health"
          )
          for url in "${urls[@]}"; do
            ready=false
            for attempt in {1..30}; do
              if curl --fail --silent --show-error --max-time 15 "$url" > /dev/null; then
                ready=true
                break
              fi
              sleep 10
            done
            if [[ "$ready" != "true" ]]; then
              echo "Producción no quedó saludable: $url" >&2
              exit 1
            fi
          done

      - name: Tag production and generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(date -u +%Y.%m).${{ github.run_number }}"
          gh release create "$tag" --target "$GITHUB_SHA" --generate-notes --title "UrbanSprout $tag"
